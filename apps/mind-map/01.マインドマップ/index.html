<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Mind Map</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="topbar">
    <h1 id="map-title" contenteditable="true" spellcheck="false" title="クリックして編集">Mind Map</h1>
    <div class="toolbar">
      <button id="add-child-btn" disabled>子を追加</button>
      <button id="edit-node-btn" disabled>編集</button>
      <button id="delete-node-btn" disabled>削除</button>
      <button id="save-map-btn">MindMap保存</button>
      <button id="import-map-btn">MindMapインポート</button>
      <button id="new-map-btn">新規作成</button>
      <button id="export-excel-btn">Excel出力</button>
    </div>
  </header>

  <section class="hierarchy-bar" aria-label="階層名設定">
    <span class="hierarchy-label">階層名</span>
    <div id="hierarchy-fields" class="hierarchy-fields"></div>
  </section>

  <input id="import-map-file" type="file" accept=".json,application/json" hidden />

  <main id="board" class="board" aria-label="mind map board">
    <svg id="link-layer" class="link-layer"></svg>
    <div id="level-guide-layer" class="level-guide-layer"></div>
    <div id="node-layer" class="node-layer"></div>

    <div id="node-context-menu" class="context-menu" role="menu" aria-hidden="true">
      <button type="button" data-action="add-child" role="menuitem">子を追加</button>
      <button type="button" data-action="edit-node" role="menuitem">編集</button>
      <button type="button" data-action="delete-node" role="menuitem">削除</button>
    </div>

    <div id="node-editor" class="node-editor" aria-hidden="true">
      <div class="node-editor-card">
        <h2>ノード編集</h2>
        <label>
          テキスト
          <input id="editor-text" type="text" maxlength="120" />
        </label>
        <label>
          背景色
          <input id="editor-color" type="color" value="#ffffff" />
        </label>
        <div class="color-palette" aria-label="おすすめ色">
          <button type="button" class="palette-swatch" data-color="#ffffff" aria-label="ホワイト" title="ホワイト"></button>
          <button type="button" class="palette-swatch" data-color="#e3e7eb" aria-label="クールグレー" title="クールグレー"></button>
          <button type="button" class="palette-swatch" data-color="#fff4d6" aria-label="ウォームアイボリー" title="ウォームアイボリー"></button>
          <button type="button" class="palette-swatch" data-color="#dff3ea" aria-label="ミントグリーン" title="ミントグリーン"></button>
          <button type="button" class="palette-swatch" data-color="#dcecff" aria-label="スカイブルー" title="スカイブルー"></button>
          <button type="button" class="palette-swatch" data-color="#f1e4ff" aria-label="ペールラベンダー" title="ペールラベンダー"></button>
          <button type="button" class="palette-swatch" data-color="#ffe0db" aria-label="ソフトコーラル" title="ソフトコーラル"></button>
          <button type="button" class="palette-swatch" data-color="#e9f7d8" aria-label="セージライム" title="セージライム"></button>
        </div>
        <div class="node-editor-actions">
          <button id="editor-cancel-btn" type="button">キャンセル</button>
          <button id="editor-save-btn" type="button">保存</button>
        </div>
      </div>
    </div>
  </main>

  <script src="./lib/xlsx.full.min.js"></script>
  <script src="./js/model.js"></script>
  <script src="./js/export.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
