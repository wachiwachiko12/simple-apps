<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{メインキーワードを含む160文字以内の説明文}">
  <title>{メインキーワード} | {サイト名}</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google AdSense: async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXX" crossorigin="anonymous" -->
</head>
<body>
  <header>
    <h1>{メインキーワードを含むタイトル}</h1>
    <p class="subtitle">{サブタイトル・説明一文}</p>
  </header>

  <main>
    <!-- 広告ユニット1（ツール上部） -->
    <div class="ad-unit" id="ad-top" aria-hidden="true"></div>

    <!-- メインツールセクション -->
    <section id="tool" class="tool-section">
      <h2>計算フォーム</h2>
      <!-- ツールのフォーム・UI をここに記述 -->
    </section>

    <!-- 広告ユニット2（結果下） -->
    <div class="ad-unit" id="ad-result" aria-hidden="true"></div>

    <!-- 使い方セクション（SEOコンテンツ・最低200文字） -->
    <section id="howto" class="howto-section">
      <h2>使い方</h2>
      <ol>
        <li>{手順1}</li>
        <li>{手順2}</li>
        <li>{手順3}</li>
      </ol>
      <h2>について</h2>
      <p>{ツールの説明・背景知識（200文字以上）}</p>
    </section>
  </main>

  <footer>
    <p><a href="/privacy-policy.html">プライバシーポリシー</a></p>
    <p><small>&copy; 2025 {サイト名}</small></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
